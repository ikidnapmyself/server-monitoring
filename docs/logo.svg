<svg width="680" height="210" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge frame (server chassis) -->
  <rect x="40" y="30" width="124" height="140" rx="16"
        fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>

  <!-- Chassis screw holes -->
  <circle cx="53" cy="43" r="3.5" fill="#5DCAA5" opacity="0.45"/>
  <circle cx="151" cy="43" r="3.5" fill="#5DCAA5" opacity="0.45"/>
  <circle cx="53" cy="157" r="3.5" fill="#5DCAA5" opacity="0.45"/>
  <circle cx="151" cy="157" r="3.5" fill="#5DCAA5" opacity="0.45"/>

  <!-- Server blades -->
  <rect x="57" y="62" width="70" height="16" rx="4" fill="#9FE1CB"/>
  <rect x="57" y="92" width="70" height="16" rx="4" fill="#9FE1CB"/>
  <rect x="57" y="122" width="70" height="16" rx="4" fill="#9FE1CB"/>

  <!-- Status LEDs -->
  <circle cx="140" cy="70" r="5" fill="#1D9E75"/>
  <circle cx="140" cy="100" r="5" fill="#378ADD"/>
  <circle cx="140" cy="130" r="5" fill="#EF9F27"/>

  <!-- Pipeline stage dots -->
  <g opacity="0.6">
    <circle cx="55" cy="183" r="4" fill="#1D9E75"/>
    <line x1="59" y1="183" x2="76" y2="183" stroke="#5DCAA5" stroke-width="1.2"/>
    <circle cx="80" cy="183" r="4" fill="#378ADD"/>
    <line x1="84" y1="183" x2="101" y2="183" stroke="#5DCAA5" stroke-width="1.2"/>
    <circle cx="105" cy="183" r="4" fill="#5DCAA5"/>
    <line x1="109" y1="183" x2="126" y2="183" stroke="#5DCAA5" stroke-width="1.2"/>
    <circle cx="130" cy="183" r="4" fill="#EF9F27"/>
  </g>

  <!-- Wordmark -->
  <text x="420" y="80" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="31" font-weight="500" fill="#141413">
    server-monitoring
  </text>

  <!-- Tagline (line 1) -->
  <text x="420" y="110" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="12" fill="#3D3D3A">
    maintenance &middot; monitoring &middot; workflows
  </text>

  <!-- Tagline (line 2) -->
  <text x="420" y="128" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="11" fill="#737268">
    Django-based alert ingestion, health checks,
  </text>
  <text x="420" y="143" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="11" fill="#737268">
    AI analysis &amp; notification delivery
  </text>

  <!-- Pipeline label row (centered) -->
  <text x="420" y="187" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="10" fill="#737268">
    ingest &#x2192; check &#x2192; analyze &#x2192; notify
  </text>
</svg>