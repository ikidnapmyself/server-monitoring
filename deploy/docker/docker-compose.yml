services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: ../../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ENABLE_CELERY_ORCHESTRATION=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - db-data:/app/db
      - static-data:/app/staticfiles

  celery:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: ../../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ENABLE_CELERY_ORCHESTRATION=1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  db-data:
  static-data: