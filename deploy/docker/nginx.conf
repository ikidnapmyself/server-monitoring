# Docker:  server web:8000;
# systemd: server unix:/run/server-monitoring/gunicorn.sock;
upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Adjust the alias path to match your deployment:
    #   Docker:  /app/staticfiles/       (if Nginx shares the container network/volume)
    #   systemd: /opt/server-monitoring/staticfiles/
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

